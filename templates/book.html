{% extends "base.html" %}

{% block content %}

<form method="POST" class="w-50">
    <input type="text" class="form-control mb-3" placeholder="Your Name" required>
    <input type="date" class="form-control mb-3" required>
    <input type="text" class="form-control mb-3" placeholder="Topic" required>
    <button class="btn btn-warning">Book</button>
</form>

{% endblock %}
